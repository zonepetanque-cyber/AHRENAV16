<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AHRENA</title>
    <meta name="description" content="L'univers de la pétanque en direct et en replay." />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Android PWA standalone (cache la barre Chrome) -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA standalone (cache la barre Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AHRENA" />
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1WXS-2iVgWywPUBSYMrwffrNqg8lEdY_Z" />

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered!', reg))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script id="onesignal-init">
      // L'App ID est injecté au runtime depuis window.__ONESIGNAL_APP_ID__
      // défini dans main.tsx via import.meta.env.VITE_ONESIGNAL_APP_ID
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(async function(OneSignal) {
        const appId = window.__ONESIGNAL_APP_ID__;
        if (!appId) { console.warn('[OneSignal] App ID manquant'); return; }
        await OneSignal.init({
          appId: appId,
          serviceWorkerPath: "/OneSignalSDKWorker.js",
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: false,
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
