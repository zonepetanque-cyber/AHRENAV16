<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AHRENA - Pétanque Live</title>
    <meta name="description" content="L'univers de la pétanque en direct et en replay." />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Android PWA fullscreen -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA fullscreen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="AHRENA" />
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1WXS-2iVgWywPUBSYMrwffrNqg8lEdY_Z" />

    <!-- Splash screens iOS -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered!', reg))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
